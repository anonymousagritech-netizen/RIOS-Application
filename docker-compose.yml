services:
  db:
    image: postgres:16
    container_name: rios-db
    environment:
      POSTGRES_USER: rios
      POSTGRES_PASSWORD: rios
      POSTGRES_DB: rios
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rios -d rios"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: rios-redis
    ports:
      - "6379:6379"
