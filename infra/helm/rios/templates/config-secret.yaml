apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rios.fullname" . }}-config
  labels: {{- include "rios.labels" . | nindent 4 }}
data:
  NODE_ENV: "production"
  PORT: {{ .Values.server.port | quote }}
  DATABASE_URL: {{ .Values.database.url | quote }}
  DATABASE_APP_URL: {{ .Values.database.appUrl | quote }}
  RIOS_VERSION: {{ .Chart.AppVersion | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rios.fullname" . }}-secrets
  labels: {{- include "rios.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
