apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rios.fullname" . }}-web
  labels: {{- include "rios.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: {{ include "rios.webImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.web.port }}
          readinessProbe:
            httpGet: { path: /index.html, port: {{ .Values.web.port }} }
            initialDelaySeconds: 3
            periodSeconds: 10
          resources: {{- toYaml .Values.web.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rios.fullname" . }}-web
  labels: {{- include "rios.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.web.port }}
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "rios.fullname" . }}
  labels: {{- include "rios.labels" . | nindent 4 }}
  annotations: {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts: [{{ .Values.ingress.host | quote }}]
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # API + health/observability go to the server service.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "rios.fullname" . }}-server
                port: { number: {{ .Values.server.port }} }
          # Everything else is the SPA.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "rios.fullname" . }}-web
                port: { number: 80 }
{{- end }}
