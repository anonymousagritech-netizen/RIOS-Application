# nginx config for the RIOS SPA. Serves the static build and reverse-proxies the
# API so the browser talks to a single origin. The API host is templated by the
# RIOS_API_UPSTREAM env at container start (default: the in-cluster service).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache hashed assets; never cache the HTML entry point.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /index.html {
    add_header Cache-Control "no-store";
  }

  # Reverse-proxy API + health/observability to the server service.
  location /api/ {
    proxy_pass http://rios-server:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location /health { proxy_pass http://rios-server:4000; }
  location /ready  { proxy_pass http://rios-server:4000; }
  location /live   { proxy_pass http://rios-server:4000; }

  # SPA fallback — every other path returns index.html for client-side routing.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
