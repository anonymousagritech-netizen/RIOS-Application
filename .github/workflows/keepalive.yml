name: 🔁 Keep RIOS Backend Alive

# Pings the deployed RIOS backend every 5 minutes so free-tier hosts
# (e.g. Render) don't spin the service down for inactivity.
#
# Set the target URL once, then this needs no further edits:
#   Repo → Settings → Secrets and variables → Actions → Variables →
#   New variable  →  RIOS_BACKEND_URL = https://<your-rios-service>.onrender.com
# If the variable is unset it falls back to the placeholder below.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping RIOS Backend
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health endpoint
        env:
          BACKEND_URL: ${{ vars.RIOS_BACKEND_URL || 'https://rios-application.onrender.com' }}
        run: |
          echo "Pinging ${BACKEND_URL}/health ..."
          # Best-effort keep-alive: a slow/asleep server (Render cold start) must
          # NOT fail the job. Long max-time + retries to give the dyno time to wake,
          # and `|| echo 000` so a curl timeout/error never aborts the step.
          STATUS=$(curl -o /dev/null -sL --max-time 120 --retry 3 --retry-all-errors \
                     -w "%{http_code}" "${BACKEND_URL}/health" || echo "000")
          echo "Response status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ RIOS backend is alive!"
          else
            echo "⚠️ RIOS backend returned $STATUS — ping sent anyway (keep-alive is best-effort)."
            echo "   If this is 000/timeout, set the RIOS_BACKEND_URL variable to your real backend URL."
          fi
