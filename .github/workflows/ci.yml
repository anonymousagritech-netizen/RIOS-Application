name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # NOTE: we use the PostgreSQL preinstalled on the ubuntu-latest runner rather
    # than a `services:` container, so CI does not depend on pulling postgres:16
    # from Docker Hub (which is rate-limited / occasionally unreachable from
    # shared runners). See "Start PostgreSQL" below.
    env:
      DATABASE_URL: postgres://rios:rios@localhost:5432/rios
      DATABASE_APP_URL: postgres://rios_app:rios_app@localhost:5432/rios
      # 0008 reads this to create the rios_app role; keep it matching the URL above.
      RIOS_APP_DB_PASSWORD: rios_app
      JWT_SECRET: ci-secret-value-at-least-32-characters-long

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Start PostgreSQL (runner-preinstalled)
        run: |
          sudo systemctl start postgresql || sudo service postgresql start
          for i in $(seq 1 30); do pg_isready -h localhost -p 5432 && break; sleep 1; done
          sudo -u postgres psql -v ON_ERROR_STOP=1 -c "CREATE ROLE rios LOGIN SUPERUSER PASSWORD 'rios';"
          sudo -u postgres psql -v ON_ERROR_STOP=1 -c "CREATE DATABASE rios OWNER rios;"
          pg_isready -h localhost -p 5432

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --workspaces --if-present

      - name: Dependency audit (high severity)
        run: npm audit --audit-level=high || true

      - name: Domain unit tests (no DB)
        run: npm run test --workspace packages/domain

      - name: Apply migrations
        run: npm run db:migrate

      - name: Seed demo data
        run: npm run db:seed

      - name: Server integration tests
        run: npm run test --workspace server

      - name: Build web
        run: npm run build --workspace web

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      DATABASE_URL: postgres://rios:rios@localhost:5432/rios
      DATABASE_APP_URL: postgres://rios_app:rios_app@localhost:5432/rios
      # 0008 reads this to create the rios_app role; keep it matching the URL above.
      RIOS_APP_DB_PASSWORD: rios_app
      JWT_SECRET: ci-secret-value-at-least-32-characters-long
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Start PostgreSQL (runner-preinstalled)
        run: |
          sudo systemctl start postgresql || sudo service postgresql start
          for i in $(seq 1 30); do pg_isready -h localhost -p 5432 && break; sleep 1; done
          sudo -u postgres psql -v ON_ERROR_STOP=1 -c "CREATE ROLE rios LOGIN SUPERUSER PASSWORD 'rios';"
          sudo -u postgres psql -v ON_ERROR_STOP=1 -c "CREATE DATABASE rios OWNER rios;"
          pg_isready -h localhost -p 5432
      - name: Install
        run: npm ci
      - name: Install e2e deps + browser
        run: |
          npm --prefix e2e ci || npm --prefix e2e install
          npx --prefix e2e playwright install --with-deps chromium
      - name: Migrate + seed
        run: npm run db:migrate && npm run db:seed
      - name: Run e2e (boots API + web, runs Playwright)
        run: |
          unset RIOS_CHROMIUM   # use Playwright's own browser in CI
          bash e2e/run.sh
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report

  images:
    runs-on: ubuntu-latest
    needs: build-and-test
    # Image builds pull base layers from Docker Hub; don't fail the whole pipeline
    # if Docker Hub is unreachable from the runner — this job is a build smoke-test.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Build server image
        run: docker build -f Dockerfile.server -t rios/server:ci .
      - name: Build web image
        run: docker build -f Dockerfile.web -t rios/web:ci .
